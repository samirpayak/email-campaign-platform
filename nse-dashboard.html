<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Circulars Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .circulars-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .circular-item {
            padding: 20px;
            border-bottom: 1px solid #eee;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .circular-item:hover {
            background: #f9f9f9;
            padding-left: 30px;
        }

        .circular-item.read {
            opacity: 0.7;
        }

        .circular-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .circular-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .circular-meta {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-category {
            background: #e3f2fd;
            color: #1976d2;
        }

        .badge-unread {
            background: #fce4ec;
            color: #c2185b;
        }

        .circular-date {
            color: #999;
            font-size: 12px;
        }

        .circular-description {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .circular-link {
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
        }

        .circular-link:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px 20px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 NSE Circulars Dashboard</h1>
            <p>Latest regulatory updates from National Stock Exchange</p>
        </div>

        <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
                <h3>Total Circulars</h3>
                <div class="number" id="totalStats">0</div>
            </div>
            <div class="stat-card">
                <h3>Unread</h3>
                <div class="number" id="unreadStats">0</div>
            </div>
            <div class="stat-card">
                <h3>Categories</h3>
                <div class="number" id="categoriesStats">0</div>
            </div>
        </div>

        <div id="alerts"></div>

        <div class="controls">
            <button class="btn btn-primary" onclick="fetchLatest()">
                🔄 Fetch Latest Circulars
            </button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by title, category..." onkeyup="searchCirculars()">
            </div>
            <button class="btn btn-secondary" onclick="resetSearch()">Reset</button>
        </div>

        <div class="circulars-list" id="circularsList">
            <div class="empty-state">
                <h3>No circulars loaded yet</h3>
                <p>Click "Fetch Latest Circulars" to load from NSE</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://mail.trugydex.in';
        let allCirculars = [];
        let token = localStorage.getItem('jwtToken');

        async function showAlert(message, type) {
            const alertContainer = document.getElementById('alerts');
            const alertEl = document.createElement('div');
            alertEl.className = `alert alert-${type}`;
            alertEl.textContent = message;
            alertContainer.appendChild(alertEl);
            setTimeout(() => alertEl.remove(), 5000);
        }

        async function fetchLatest() {
            if (!token) {
                showAlert('Please log in first', 'error');
                window.location.href = '/';
                return;
            }

            const button = event.target;
            button.disabled = true;
            button.textContent = '⏳ Fetching...';

            try {
                const response = await fetch(`${API_BASE}/api/nse/fetch`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`✓ ${data.message}`, 'success');
                    loadCirculars();
                } else {
                    showAlert(`✗ ${data.message}`, 'error');
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                button.disabled = false;
                button.textContent = '🔄 Fetch Latest Circulars';
            }
        }

        async function loadCirculars() {
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/api/nse/circulars?limit=50`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    allCirculars = data.circulars;
                    loadStats();
                    displayCirculars(allCirculars);
                }
            } catch (error) {
                showAlert(`Error loading circulars: ${error.message}`, 'error');
            }
        }

        async function loadStats() {
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/api/nse/stats`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('totalStats').textContent = data.stats.total;
                    document.getElementById('unreadStats').textContent = data.stats.unread;
                    document.getElementById('categoriesStats').textContent = data.stats.byCategory.length;
                }
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function displayCirculars(circulars) {
            const container = document.getElementById('circularsList');

            if (circulars.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>No circulars found</h3>
                        <p>Click "Fetch Latest Circulars" to load from NSE</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = circulars.map(circular => `
                <div class="circular-item ${circular.read ? 'read' : ''}" onclick="viewCircular('${circular._id}')">
                    <div class="circular-header">
                        <div class="circular-title">${escapeHtml(circular.title)}</div>
                        <div class="circular-meta">
                            <span class="badge badge-category">${escapeHtml(circular.category || 'General')}</span>
                            ${!circular.read ? '<span class="badge badge-unread">Unread</span>' : ''}
                        </div>
                    </div>
                    <div class="circular-date">${new Date(circular.pubDate).toLocaleDateString('en-IN', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })}</div>
                    ${circular.description ? `<div class="circular-description">${escapeHtml(circular.description.substring(0, 150))}...</div>` : ''}
                    <a href="${circular.link}" class="circular-link" target="_blank" onclick="event.stopPropagation();">→ View Official Circular</a>
                </div>
            `).join('');
        }

        async function viewCircular(id) {
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/api/nse/circulars/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (data.success) {
                    // Open the official link
                    window.open(data.circular.link, '_blank');
                    // Reload to update read status
                    loadCirculars();
                }
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        }

        function searchCirculars() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCirculars.filter(c =>
                c.title.toLowerCase().includes(keyword) ||
                c.description.toLowerCase().includes(keyword) ||
                c.category.toLowerCase().includes(keyword)
            );
            displayCirculars(filtered);
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            displayCirculars(allCirculars);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Load data on page load
        window.addEventListener('load', () => {
            if (!token) {
                showAlert('You need to log in first', 'error');
            } else {
                loadStats();
                loadCirculars();
            }
        });
    </script>
</body>
</html>
