<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Campaign Manager - Trugydex</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary-blue:#003087;--primary-green:#2E7D32;--secondary-blue:#1a4a8f;--light-blue:#f0f4f9;--light-green:#f1f8f4;--text-primary:#1a1a1a;--text-secondary:#666666;--border-color:#e0e0e0;--success-color:#2E7D32;--error-color:#ef4444}
        body{font-family:'DM Sans',sans-serif;background:#f8f9fa;color:var(--text-primary);line-height:1.6}
        .login-container{min-height:100vh;background:linear-gradient(135deg,var(--primary-blue) 0%,var(--secondary-blue) 100%);display:flex;align-items:center;justify-content:center;padding:2rem}
        .login-card{background:white;border-radius:16px;padding:3rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,48,135,0.2)}
        .login-tabs{display:flex;margin-bottom:2rem;border-bottom:2px solid var(--border-color)}
        .login-tab-btn{flex:1;padding:12px;background:transparent;border:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--text-secondary);border-bottom:3px solid transparent;transition:all 0.3s}
        .login-tab-btn.active{color:var(--primary-blue);border-bottom-color:var(--primary-blue)}
        .login-form{display:none}.login-form.active{display:block}
        .form-group{margin-bottom:1.5rem}
        .form-label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:var(--primary-blue);text-transform:uppercase;letter-spacing:0.5px}
        input[type="text"],input[type="email"],input[type="password"]{width:100%;padding:12px 14px;border:2px solid var(--border-color);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;transition:all 0.3s;background:white}
        input:focus{outline:none;border-color:var(--primary-blue);box-shadow:0 0 0 4px rgba(0,48,135,0.1)}
        .button-login{width:100%;padding:12px;background:linear-gradient(135deg,var(--primary-blue) 0%,var(--secondary-blue) 100%);color:white;border:none;border-radius:8px;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;transition:all 0.3s;margin-top:1rem}
    </style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <div style="text-align:center;margin-bottom:1rem;">
            <p style="font-size:13px;color:var(--text-secondary);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:1rem;">EMAIL CAMPAIGN MANAGER</p>
            <img src="/logo.png" alt="Trugydex" style="max-width:200px;width:100%;height:auto;" />
        </div>
        <div class="login-tabs">
            <button class="login-tab-btn active" onclick="switchLoginTab('login',this)">Login</button>
            <button class="login-tab-btn" onclick="switchLoginTab('signup',this)">Signup</button>
        </div>
        <form class="login-form active" id="loginForm" onsubmit="handleLogin(event)">
            <div id="loginNotice"></div>
            <div class="form-group"><label class="form-label">User ID</label><input type="text" id="loginEmail" placeholder="Enter your User ID" required /></div>
            <div class="form-group"><label class="form-label">Password</label><input type="password" id="loginPassword" placeholder="••••••••" required /></div>
            <button type="submit" class="button-login">Login</button>
        </form>
        <form class="login-form" id="signupForm" onsubmit="handleSignup(event)">
            <div id="signupNotice"></div>
            <div class="form-group"><label class="form-label">Full Name</label><input type="text" id="signupName" placeholder="Your Full Name" required /></div>
            <div class="form-group"><label class="form-label">User ID</label><input type="text" id="signupEmail" placeholder="e.g. EMP001" required /></div>
            <div class="form-group"><label class="form-label">Password</label><input type="password" id="signupPassword" placeholder="Min 6 characters" required /></div>
            <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" id="signupConfirm" placeholder="Confirm password" required /></div>
            <button type="submit" class="button-login">Create Account</button>
        </form>
    </div>
</div>

<script>
    const API_BASE = 'https://mail.trugydex.in/api';
    
    function switchLoginTab(tab, clickedBtn) {
        document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
        document.querySelectorAll('.login-tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tab === 'login' ? 'loginForm' : 'signupForm').classList.add('active');
        clickedBtn.classList.add('active');
    }
    
    async function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const btn = e.target.querySelector('button[type="submit"]');
        
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        
        try {
            const res = await fetch(API_BASE + '/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            
            const data = await res.json();
            
            if (!res.ok) throw new Error(data.message);
            
            localStorage.setItem('tg_token', data.token);
            localStorage.setItem('tg_user', JSON.stringify(data.user));
            
            window.location.href = '/dashboard.html';
        } catch(err) {
            showLoginNotice(err.message, 'error');
        } finally {
            btn.textContent = 'Login';
            btn.disabled = false;
        }
    }
    
    async function handleSignup(e) {
        e.preventDefault();
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        
        if (!name) { showSignupNotice('Please enter your full name.'); return; }
        if (!email || email.length < 3) { showSignupNotice('Please enter a valid User ID (minimum 3 characters).'); return; }
        if (password.length < 6) { showSignupNotice('Password must be at least 6 characters.'); return; }
        if (password !== confirm) { showSignupNotice('Passwords do not match.'); return; }
        
        const btn = document.querySelector('#signupForm button[type="submit"]');
        btn.textContent = 'Creating account...';
        btn.disabled = true;
        
        try {
            const res = await fetch(API_BASE + '/auth/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            
            const data = await res.json();
            if (!res.ok) throw new Error(data.message);
            
            document.getElementById('signupForm').reset();
            switchLoginTab('login', document.querySelectorAll('.login-tab-btn')[0]);
            document.getElementById('loginEmail').value = email;
            document.getElementById('loginPassword').value = password;
            showLoginNotice('Account created! Awaiting admin approval before you can login.', 'success');
        } catch(err) {
            showSignupNotice(err.message);
        } finally {
            btn.textContent = 'Create Account';
            btn.disabled = false;
        }
    }
    
    function showLoginNotice(msg, type) {
        const notice = document.getElementById('loginNotice');
        notice.innerHTML = `<div style="padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:13px;font-weight:600;text-align:center;background:${type === 'success' ? '#d1fae5' : '#fee2e2'};color:${type === 'success' ? '#2E7D32' : '#ef4444'};">${msg}</div>`;
    }
    
    function showSignupNotice(msg) {
        const notice = document.getElementById('signupNotice');
        notice.innerHTML = `<div style="padding:10px 14px;border-radius:8px;margin-bottom:1rem;font-size:13px;font-weight:600;text-align:center;background:#fee2e2;color:#ef4444;">${msg}</div>`;
        setTimeout(() => { notice.innerHTML = ''; }, 4000);
    }
    
    // Check if already logged in
    window.addEventListener('load', () => {
        const token = localStorage.getItem('tg_token');
        if (token) {
            window.location.href = '/dashboard.html';
        }
    });
</script>

</body>
</html>
